<div class="admin-layout-wrapper">
  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" *ngIf="isMobileSidebarOpen" (click)="closeMobileSidebar()"></div>

  <!-- Sidebar Component -->
  <app-admin-sidebar 
    [isCollapsed]="isSidebarCollapsed" 
    [class.mobile-open]="isMobileSidebarOpen"
    (toggleSidebar)="toggleSidebar()"
    class="sidebar-container">
  </app-admin-sidebar>

  <!-- Main Content Area -->
  <div class="main-content" [class.expanded]="isSidebarCollapsed">
    <!-- Top Header for Mobile -->
    <header class="admin-header d-lg-none">
      <div class="d-flex align-items-center">
        <!-- Mobile Toggle Button -->
        <button class="mobile-toggle-btn" (click)="toggleMobileSidebar()">
          <i class="bi bi-list"></i>
        </button>
      </div>
    </header>

    <main class="content-wrapper p-3 p-md-4">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
