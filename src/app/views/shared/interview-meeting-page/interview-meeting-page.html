<div class="meet-container">

  <!-- HEADER -->
<!-- HEADER -->
<div class="meet-header mt-3">

  <!-- LEFT -->
  <div class="header-left">
    <button
      class="btn btn-sm btn-outline-light back-btn"
      routerLink="/seeker/scheduled-meetings">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <!-- CENTER -->
  <div class="header-center">
    <div class="fw-semibold">Live Interview Session</div>
    <div class=" small text-white">
      TechNova Pvt Ltd • Frontend Developer
    </div>
  </div>

  <!-- RIGHT (empty for now) -->
  <div class="header-right"></div>

</div>


<input type="checkbox" id="chat-toggle" class="chat-toggle" />


<!-- STAGE -->
<div class="meet-stage">

  <!-- VIDEO AREA -->
  <div class="video-area">

    <div class="main-video">
      <i class="bi bi-person-video3"></i>
      <span class="label">Interviewer</span>
    </div>

    <div class="self-video">
      <i class="bi bi-person-circle"></i>
      <span class="label">You</span>
    </div>

  </div>

  <!-- CHAT SIDEBAR -->
  <div class="chat-sidebar">
    <div class="chat-header">
      <span>Meeting Chat</span>
      <label for="chat-toggle" class="chat-close">
        <i class="bi bi-x-lg"></i>
      </label>
    </div>

    <div class="chat-body">
      <p class="chat-msg other">Hello, welcome to the interview.</p>
      <p class="chat-msg me">Thank you!</p>
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Type a message..." />
      <button><i class="bi bi-send-fill"></i></button>
    </div>
  </div>

</div>







  <!-- CONTROLS -->
  <div class="meet-controls ">

    <button class="meet-btn">
      <i class="bi bi-mic-fill"></i>
    </button>

    <button class="meet-btn">
      <i class="bi bi-camera-video-fill"></i>
    </button>

    <button class="meet-btn">
      <i class="bi bi-display"></i>
    </button>

      <!-- CHAT TOGGLE -->
  <label for="chat-toggle" class="meet-btn">
    <i class="bi bi-chat-dots-fill"></i>
  </label>

    <button class="meet-btn end">
      <i class="bi bi-telephone-x-fill"></i>
    </button>

  </div>

</div>
