<div class="file-upload-wrapper">

  <!-- Hidden file input -->
  <input type="file"  [accept]="accept" hidden #fileInput  (change)="onFileSelect($event)"/>

  <!-- Upload button -->
  <button type="button" class="btn btn-outline-primary upload-btn" (click)="fileInput.click()">
    <i class="bi bi-upload me-2"></i> Upload File
  </button>

  <!-- Upload progress -->
  @if (uploading) {
    <div class="upload-progress mt-3">
      <div class="progress shadow-sm">
        <div class="progress-bar progress-bar-striped progress-bar-animated" [style.width.%]="progress"> </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <span class="text-muted small fw-bold">Uploading...</span>
        <span class="text-primary small fw-bold">{{ progress }}%</span>
      </div>
    </div>
  }

</div>
