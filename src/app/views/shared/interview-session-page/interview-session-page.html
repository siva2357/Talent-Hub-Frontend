<div class="container mt-5 pt-5" style="max-width:900px;">

  <h4 class="fw-semibold mb-1">Join Interview</h4>
  <p class="text-muted mb-4">
    Check your audio and video before joining
  </p>

  <!-- ERROR -->
  @if (mediaError) {
    <div class="alert alert-danger">
      {{ mediaError }}
    </div>
  }

  <div class="row g-4">

    <!-- VIDEO PREVIEW -->
    <div class="col-md-7">
      <div class="border rounded p-2 bg-dark text-center">
        <video
          #video
          autoplay
          muted
          playsinline
          style="width:100%; height:360px; object-fit:cover;">
        </video>
      </div>

      <small class="text-muted d-block mt-2">
        Camera: {{ cameraOn ? 'On' : 'Off' }} •
        Mic: {{ micOn ? 'On' : 'Off' }}
      </small>
    </div>

    <!-- CONTROLS -->
    <div class="col-md-5">

      <label class="form-label">Full Name</label>
      <input
        type="text"
        class="form-control mb-3"
        [(ngModel)]="fullName"
        placeholder="Enter your full name">

      <div class="d-flex gap-2 mb-3">

        <button
          class="btn btn-outline-secondary"
          type="button"
          (click)="toggleMic()">
          🎤 {{ micOn ? 'Mic On' : 'Mic Off' }}
        </button>

        <button
          class="btn btn-outline-secondary"
          type="button"
          (click)="toggleCamera()">
          🎥 {{ cameraOn ? 'Camera On' : 'Camera Off' }}
        </button>

      </div>

      <button
        class="btn btn-primary w-100"
        [disabled]="!fullName || !!mediaError"
        (click)="joinMeeting()">
        Join Interview
      </button>

    </div>

  </div>
</div>
