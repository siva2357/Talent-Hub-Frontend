@if (!isLoading) {

<div class="container" style="font-family:'Poppins',sans-serif">

  <div class="row justify-content-center mb-5">
    <div class="col-lg-6">

      <div class="card shadow-sm p-4 text-center rounded-4">

        <!-- PROFILE IMAGE PREVIEW -->
        <app-file-preview
          [fileUrl]="profilePhotoUrl"
        ></app-file-preview>

        <!-- FILE UPLOAD -->
        <app-file-upload
          class="mt-4"
          [bucketKey]="BucketKey.JOBSEEKER_DATA"
          [section]="UploadSection.PROFILE_PHOTO"
          accept="image/*"
          (uploaded)="onPhotoUploaded($event)"
        ></app-file-upload>

        @if (uploadComplete) {
          <div class="text-success fw-semibold mt-3">
            Image updated successfully
          </div>
        }

      </div>
    </div>
  </div>



</div>

}

@if (isLoading) {
  <div class="container text-center py-5">
    <div class="spinner-border"></div>
    <p class="mt-3">Loading profile image...</p>
  </div>
}
