<div class="container py-4">

  <h4 class="fw-bold mb-4">Account Settings</h4>

  <!-- Tabs -->
<!-- Tabs -->
<ul class="nav nav-tabs modern-tabs mb-3" id="settingsTabs">

  <!-- BASIC DETAILS -->
  <li class="nav-item">
    <a class="nav-link active" data-bs-toggle="tab" href="#basicTab">

  <li class="nav-item">
    <a class="nav-link" data-bs-toggle="tab" href="#profileTab">

  <li class="nav-item">
    <a class="nav-link" data-bs-toggle="tab" href="#professionalTab">

  </li>

  <li class="nav-item">
    <a class="nav-link" data-bs-toggle="tab" href="#manageTab">

  </li>

  <li class="nav-item">

</ul>

    </div>

    <div class="tab-pane fade" id="deleteTab">
