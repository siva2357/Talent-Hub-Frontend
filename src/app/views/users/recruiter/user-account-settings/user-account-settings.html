<div class="container pt-4 pb-2">


  <!-- HEADER ROW -->
  <div class="d-flex align-items-center gap-2 mb-2">

    <!-- BACK ICON ONLY -->
    <div
      class="mobile-back-icon d-flex align-items-center justify-content-center"
      routerLink="/recruiter"
    >
      <i class="bi bi-arrow-left" style="font-size: 1.3rem;"></i>
    </div>

    <!-- HEADING -->
    <h4 class=" mb-0">Account Settings</h4>

  </div>

  <!-- Tabs -->

<div class="tabs-scroll-wrapper mt-3">
  <ul class="nav nav-tabs modern-tabs mb-3" id="settingsTabs">

    <li class="nav-item">
      <a class="nav-link active" data-bs-toggle="tab" href="#basicTab">
        <i class="bi bi-person-lines-fill me-2"></i> Basic Details
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#profileTab">
        <i class="bi bi-person-circle me-2"></i> Profile
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#professionalTab">
        <i class="bi bi-briefcase me-2"></i> Professional Details
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#manageTab">
        <i class="bi bi-shield-lock me-2"></i> Change Password
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#deleteTab">
        <i class="bi bi-gear-wide-connected me-2"></i> Manage Account
      </a>
    </li>

  </ul>
</div>



  <!-- Content -->
  <div class="tab-content">

    <!-- BASIC DETAILS TAB -->
    <div class="tab-pane fade show active" id="basicTab">
      <app-update-basic-details></app-update-basic-details>
    </div>

    <!-- PROFILE TAB -->
    <div class="tab-pane fade" id="profileTab">
      <app-update-profile-details></app-update-profile-details>
    </div>

    <!-- PROFESSIONAL DETAILS -->
    <div class="tab-pane fade" id="professionalTab">
      <app-update-professional-details></app-update-professional-details>
    </div>

    <!-- MANAGE ACCOUNT (Change password, email updates etc) -->
    <div class="tab-pane fade" id="manageTab">
      <app-update-change-password></app-update-change-password>
    </div>

    <!-- DELETE ACCOUNT -->
    <div class="tab-pane fade" id="deleteTab">
      <app-manage-account></app-manage-account>
    </div>

  </div>
</div>
