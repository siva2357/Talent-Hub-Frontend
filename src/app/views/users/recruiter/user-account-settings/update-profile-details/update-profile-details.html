@if (!isLoading) {

<div class="container profile-photo-container">

  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">

      <div class="card photo-card">
        <div class="card-body text-center">

          <!-- HEADER -->
          <div class="mb-4">
            <h5 class="section-title">Profile Photo</h5>
            <p class="section-subtitle">
              Upload a professional photo visible to recruiters
            </p>
          </div>

          <!-- PROFILE IMAGE PREVIEW -->
          <div class="photo-preview-wrapper mb-3">
            <app-file-preview
              [fileUrl]="profilePhotoUrl"
            ></app-file-preview>
          </div>

          <!-- FILE UPLOAD -->
          <app-file-upload
            class="mt-3"
            [bucketKey]="BucketKey.RECRUITER_DATA"
            [section]="UploadSection.PROFILE_PHOTO"
            accept="image/*"
            (uploaded)="onPhotoUploaded($event)"
          ></app-file-upload>

          <!-- SUCCESS MESSAGE -->
          @if (uploadComplete) {
            <div class="success-text mt-3">
              Profile image updated successfully
            </div>
          }

        </div>
      </div>

    </div>
  </div>

</div>

}

@if (isLoading) {
  <div class="container-fluid">
    <div class="loading-wrapper">
      <div class="spinner-border" role="status"></div>
      <p class="mt-3">Loading profile image...</p>
    </div>
  </div>
}
