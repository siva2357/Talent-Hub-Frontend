@if (!isLoading) {
  <div class="container" style="font-family: 'Poppins', sans-serif;">
    <form
      [formGroup]="professionalForm"
      (ngSubmit)="updateProfessionalDetails()"
      style="font-size: 14px;"
    >

      <!-- ================= COMPANY ================= -->
      <div class="mb-3">
        <label class="form-label">
          Company <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          formControlName="companyId"
          class="form-control form-control-sm"
          placeholder="Company name"
        />
      </div>

            <!-- ================= DESIGNATION ================= -->
      <div class="mb-3">
        <label class="form-label">
          Sector <span class="text-danger">*</span>
        </label>
        <select
          formControlName="sector"
          class="form-select form-select-sm"   (change)="onSectorChange()"
        >
          <option value="">Select sector</option>
          @for (s of sectors; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>


      <!-- ================= DESIGNATION ================= -->
      <div class="mb-3">
        <label class="form-label">
          Designation <span class="text-danger">*</span>
        </label>
        <select
          formControlName="designation"
          class="form-select form-select-sm"
        >
          <option value="">Select designation</option>
          @for (d of designations; track d) {
            <option [value]="d">{{ d }}</option>
          }
        </select>
      </div>

      <!-- ================= EXPERIENCE ================= -->
      <div class="mb-3">
        <label class="form-label">
          Experience (years) <span class="text-danger">*</span>
        </label>
        <input
          type="number"
          formControlName="yearsOfExperience"
          class="form-control form-control-sm"
          min="0"
        />
      </div>

      <!-- ================= LANGUAGES ================= -->
      <div class="mb-4">
        <label class="form-label">
          Languages <span class="text-danger">*</span>
        </label>

        <div formArrayName="languages">
          @for (lang of languages.controls; let i = $index; track i) {
            <div [formGroupName]="i" class="row g-2 mb-2 align-items-center">

              <div class="col-5">
<select
  class="form-select form-select-sm"
  formControlName="language"
>
  <option value="">Select language</option>
  @for (l of languagesList; track l) {
    <option [value]="l">{{ l }}</option>
  }
</select>

              </div>

              <div class="col-5">
<select
  class="form-select form-select-sm"
  formControlName="level"
>
  <option value="">Select proficiency</option>
  @for (p of proficiencyList; track p) {
    <option [value]="p">{{ p }}</option>
  }
</select>

              </div>

              <div class="col-2 text-end">
                @if (languages.length > 1) {
                  <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    (click)="removeLanguage(i)"
                  >
                    <i class="bi bi-trash"></i>
                  </button>
                }
              </div>

            </div>
          }
        </div>

        <button
          type="button"
          class="btn btn-primary btn-sm mt-2"
          (click)="addLanguage()"
        >
          + Add Language
        </button>
      </div>

      <!-- ================= SOCIAL PROFILES ================= -->
      <div class="mb-4">
        <label class="form-label">
          Social Profiles
        </label>

        <div formArrayName="socialProfiles">
          @for (sp of socialProfiles.controls; let i = $index; track i) {
            <div [formGroupName]="i" class="row g-2 mb-2 align-items-center">

              <div class="col-5">
                <select
                  class="form-select form-select-sm"
                  formControlName="platform"
                >
                  <option value="">Select platform</option>
                  @for (p of platforms; track p) {
                    <option [value]="p">{{ p }}</option>
                  }
                </select>
              </div>

              <div class="col-5">
                <input
                  type="text"
                  class="form-control form-control-sm"
                  placeholder="Profile URL"
                  formControlName="link"
                />
              </div>

              <div class="col-2 text-end">
                @if (socialProfiles.length > 1) {
                  <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    (click)="removeSocialProfile(i)"
                  >
                    <i class="bi bi-trash"></i>
                  </button>
                }
              </div>

            </div>
          }
        </div>

        <button
          type="button"
          class="btn btn-primary btn-sm mt-2"
          (click)="addSocialProfile()"
        >
          + Add Social Profile
        </button>
      </div>

      <!-- ================= ACTIONS ================= -->
      <div class="d-flex justify-content-between mb-5">
        <button
          type="button"
          class="btn btn-outline-danger btn-sm px-4"
          (click)="discard()"
        >
          Discard
        </button>

        <button
          type="submit"
          class="btn btn-outline-primary btn-sm px-4"
          [disabled]="professionalForm.invalid || isUpdating"
        >
          @if (isUpdating) { Updating... } @else { Update }
        </button>
      </div>

    </form>
  </div>
}

@if (isLoading) {
  <div class="container text-center py-5">
    <div class="spinner-border"></div>
    <p class="mt-3 fs-6">Loading professional details...</p>
  </div>
}
