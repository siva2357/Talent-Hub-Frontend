

<header class="app-header shadow-lg">

  <!-- TOP NAV CONTAINER -->
  <div class="d-flex align-items-center justify-content-between px-3" style="height: 70px; gap: 20px;">

    <!-- LEFT SECTION: Logo + Navigation -->
    <div class="d-flex align-items-center" style="gap: 25px;">

      <!-- Logo -->
      <img src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
          alt="logo"
          style="height: 48px; width: auto;">

   <button class="hamburger-btn" (click)="toggleSidebar()">
      <i class="bi bi-list fs-3"></i>
    </button>



    </div>

    <!-- RIGHT SECTION -->
    <div class="d-flex align-items-center" style="gap: 22px; margin-right: 25px; ">

      <!-- Bell Dropdown -->
      <div class="dropdown dropdown-center mx-2">
        <a class="header-icon" data-bs-toggle="dropdown">
          <i class="bi bi-bell" style="font-size: 1.3rem;"></i>
        </a>

        <ul class="dropdown-menu text-small shadow" style="width: 250px;">
          <li><a class="dropdown-item" href="#">New project...</a></li>
          <li><a class="dropdown-item" href="#">Settings</a></li>
          <li><a class="dropdown-item" href="#">Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#">Sign out</a></li>
        </ul>
      </div>

      <!-- Profile Dropdown -->
<!-- Profile Dropdown -->
<div class="dropdown ">

  <a class="header-icon" data-bs-toggle="dropdown">
    <img src="https://github.com/mdo.png"
          alt="profile"
          width="38" height="38"
          class="rounded-circle">
  </a>

  <ul class="dropdown-menu dropdown-menu-end profile-menu" style="width: 200px;">
    <li><a class="dropdown-item" routerLink="profile">Profile</a></li>
    <li><a class="dropdown-item" routerLink="account-settings">Settings</a></li>
    <li><hr class="dropdown-divider"></li>
    <li><a class="dropdown-item" routerLink="/login">Log out</a></li>
  </ul>

</div>

    </div>

  </div>

</header>


<!-- BODY: Sidebar + Content -->
<div class="admin-container"  [class.sidebar-open]="sidebarOpen">

<aside class="sidebar "
       [ngClass]="{'open': sidebarOpen}"
       style="font-family: 'Poppins', sans-serif;">

  <ul class="nav-list" style="margin-top: 80px;">

    @for (menu of menuItems; track menu) {
      <li style="margin-left: 10px; margin-right: 10px; margin-top: 15px;">

        <a [routerLink]="menu.link"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"  (click)="closeSidebarOnMobile()">

          <i [class]="menu.icon" style="font-size: 1.5rem;"></i>

          <span class="links_name poppins-medium"
                style="margin-left: 15px;">
            {{ menu.label }}
          </span>

        </a>



      </li>
    }

  </ul>

</aside>



  <!-- MAIN CONTENT -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>

</div>
