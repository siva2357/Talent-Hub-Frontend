<div class="container mt-5 pt-5">
  <form (ngSubmit)="uploadMcqs()" enctype="multipart/form-data">

    <input
      type="file"
      (change)="onFileSelect($event)"
      accept=".csv,.json"
      class="form-control mb-3"
    />

    <button type="submit" class="btn btn-primary">
      Upload MCQs
    </button>

  </form>
</div>
