<div class="dropdown">

  <a class="d-flex align-items-center"
     data-bs-toggle="dropdown"
     role="button">
  <img
    [src]="profileImage"
    (error)="profileImage = 'assets/images/Avatar.jpg'"
    width="36"
    height="36"
    class="rounded-circle border border-2 border-dark">
  </a>

  <ul class="dropdown-menu dropdown-menu-end shadow-sm profile-menu">

    <li class="px-3 py-2">
      <div class="fw-semibold">{{ fullName }}</div>
      <small class="text-muted text-capitalize">{{ role }}</small>
    </li>

    <li><hr class="dropdown-divider"></li>

    <li>
      <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/profile">
        <i class="bi bi-person"></i> Profile
      </a>
    </li>

    <li>
      <a class="dropdown-item d-flex align-items-center gap-2"  routerLink="/account-settings">
        <i class="bi bi-gear"></i> Settings
      </a>
    </li>

    <li><hr class="dropdown-divider"></li>

    <li>
      <a class="dropdown-item d-flex align-items-center gap-2 text-danger"  (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Log out
      </a>
    </li>

  </ul>

</div>
