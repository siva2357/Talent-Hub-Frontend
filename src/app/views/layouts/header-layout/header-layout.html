<!-- ================= DESKTOP / TABLET ================= -->
@if (!isMobile) {
<nav class="navbar navbar-expand-lg fixed-top bg-white shadow-lg header-navbar">
  <div class="container-fluid">

    <!-- LEFT -->
    <div class="d-flex align-items-center gap-4">

      <a class="navbar-brand" routerLink="/home">
        <img
          src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
          height="48"
          alt="Talent Hub"
        />
      </a>

      <ul class="navbar-nav header-nav d-none d-lg-flex">
        <li class="nav-item"><a routerLink="/home" routerLinkActive="active-link">Home</a></li>
        <li class="nav-item"><a routerLink="/talent-marketplace" routerLinkActive="active-link">Talent</a></li>
        <li class="nav-item"><a routerLink="/find-work" routerLinkActive="active-link">Find work</a></li>
        <li class="nav-item"><a routerLink="/recruitment-process" routerLinkActive="active-link">Recruitment</a></li>
        <li class="nav-item"><a routerLink="/resume-analyzer" routerLinkActive="active-link">Resume Analyzer</a></li>
        <li class="nav-item"><a routerLink="/about" routerLinkActive="active-link">About</a></li>
        <li class="nav-item"><a routerLink="/blog" routerLinkActive="active-link">Blog</a></li>
      </ul>
    </div>

    <!-- RIGHT -->
    <div class="d-none d-lg-flex align-items-center gap-3">
      <button class="btn btn-primary btn-sm" (click)="goToLogin()">Login</button>
      <button class="btn btn-dark btn-sm" (click)="goToSignup()">Sign up</button>
    </div>

  </div>
</nav>
}

<!-- ================= MOBILE / TABLET ================= -->
@if (isMobile) {
<nav class="navbar fixed-top bg-white shadow-md header-navbar px-2">
  <div class="container-fluid">

    <button
      class="navbar-toggler border-0 shadow-none p-0"
      type="button"
      data-bs-toggle="offcanvas"
      data-bs-target="#mobileMenu">
      <i class="bi bi-list fs-1 text-dark"></i>
    </button>

    <a class="navbar-brand ms-2 me-auto" routerLink="/home">
      <img
        src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
        height="44"
        alt="Talent Hub"
      />
    </a>

    <div class="d-flex align-items-center gap-2">
       <button class="btn btn-primary btn-sm d-none d-sm-block" (click)="goToLogin()">Login</button>
    </div>

  </div>
</nav>

<div class="offcanvas offcanvas-start border-0 shadow-lg" id="mobileMenu" style="width: 280px;">
  <div class="offcanvas-header bg-gradient-light border-bottom">
    <a class="navbar-brand" routerLink="/home" data-bs-dismiss="offcanvas">
      <img
        src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
        height="40"
        alt="Talent Hub"
      />
    </a>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>

  <div class="offcanvas-body d-flex flex-column p-4">
    <ul class="navbar-nav header-nav-mobile gap-3">
      <li><a routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" data-bs-dismiss="offcanvas">Home</a></li>
      <li><a routerLink="/talent-marketplace" routerLinkActive="active-link" data-bs-dismiss="offcanvas">Talent Marketplace</a></li>
      <li><a routerLink="/find-work" routerLinkActive="active-link" data-bs-dismiss="offcanvas">Find Work</a></li>
      <li><a routerLink="/recruitment-process" routerLinkActive="active-link" data-bs-dismiss="offcanvas">Recruitment</a></li>
      <li><a routerLink="/resume-analyzer" routerLinkActive="active-link" data-bs-dismiss="offcanvas">Resume Analyzer</a></li>
      <li><a routerLink="/about" routerLinkActive="active-link" data-bs-dismiss="offcanvas">About Us</a></li>
      <li><a routerLink="/blog" routerLinkActive="active-link" data-bs-dismiss="offcanvas">Blog</a></li>
    </ul>

    <div class="mt-auto pt-4 border-top">
      <div class="d-grid gap-2">
        <button class="btn btn-primary btn-lg" (click)="goToLogin()" data-bs-dismiss="offcanvas">Login</button>
        <button class="btn btn-dark btn-lg" (click)="goToSignup()" data-bs-dismiss="offcanvas">Sign Up</button>
      </div>
      <p class="text-center text-muted small mt-3 mb-0">Join our community today</p>
    </div>
  </div>
</div>
}
