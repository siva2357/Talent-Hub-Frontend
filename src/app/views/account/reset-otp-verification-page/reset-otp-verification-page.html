<div class="auth-wrapper">
  <div class="auth-card p-4 p-sm-5 text-center">
    <!-- Logo -->
    <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-4" />

    <h4 class="fw-bold mb-2">Reset Password Verification</h4>
    
    <p class="text-muted small mb-4">
      A verification code has been sent to your email.<br>
      Please enter the 6-digit code below.
    </p>

    <!-- OTP INPUTS -->
    <div class="otp-box">
      @for (item of otp; track i; let i = $index){
        <input
          type="text"
          maxlength="1"
          class="otp-input"
          [(ngModel)]="otp[i]"
          (input)="onInput($event, i)"
          (keydown.backspace)="onBackspace($event, i)"
        />
      }
    </div>

    <!-- ERROR -->
    @if (errorMsg) {
      <p class="text-danger small mb-3 fw-medium">
        <i class="bi bi-exclamation-circle me-1"></i> {{ errorMsg }}
      </p>
    }

    <app-button
      class="d-block w-100"
      label="Verify Code"
      size="lg"
      variant="primary"
      [isLoading]="isLoading"
      [disabled]="otp.join('').length !== 6"
      (click)="verifyCode()">
    </app-button>


    <p class="text-center text-muted mt-4 mb-0 small">
      Didn't receive the code?
      <a href="javascript:void(0)" class="fw-semibold text-primary ms-1" style="text-decoration:none;">Resend</a>
    </p>
  </div>
</div>
