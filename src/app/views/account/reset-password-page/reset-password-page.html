<div class="auth-wrapper">
  <div class="auth-card p-4 p-sm-5 text-center">
    <!-- Logo -->
    <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-4" />

    <h4 class="fw-bold mb-2">Reset Password</h4>
    
    <p class="text-muted small mb-4">
      Create a new secure password for your Talent Hub account.
    </p>

    <!-- FORM -->
    <form class="text-start" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label small fw-semibold text-dark mb-1">New Password</label>
        <app-input-fields 
          [form]="resetForm"
          controlName="password"
          type="password" 
          placeholder="••••••••" 
          height="48px">
        </app-input-fields>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold text-dark mb-1">Confirm New Password</label>
        <app-input-fields 
          [form]="resetForm"
          controlName="confirmPassword"
          type="password" 
          placeholder="••••••••" 
          height="48px">
        </app-input-fields>
        @if (resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched) {
          <p class="text-danger small mt-1 mb-0">Passwords do not match</p>
        }
      </div>

      <app-button 
        class="d-block w-100" 
        label="Reset Password" 
        variant="primary" 
        type="submit"
        size="lg"
        [disabled]="resetForm.invalid">
      </app-button>
    </form>


    <!-- LOGIN LINK -->
    <p class="text-center text-muted mt-4 mb-0 small">
      Remembered your password?
      <a href="/login" class="fw-semibold text-primary login-link ms-1" style="text-decoration:none;">Login</a>
    </p>
  </div>
</div>
