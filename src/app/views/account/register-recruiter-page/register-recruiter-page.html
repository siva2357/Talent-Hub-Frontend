<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card signup-card p-4 border-2 border-dark">

    <!-- Logo -->
    <div class="text-center mb-3">
      <img
        src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
        alt="Talent Hub"
        class="logo-img">
    </div>

    <!-- Title -->
    <h4 class="text-center fw-bold mb-2">Create Recruiter Account</h4>
    <p class="text-center text-muted mb-4 small">
      Join Talent Hub as a Recruiter
    </p>

    <!-- SIGNUP FORM -->
    <form [formGroup]="form" (ngSubmit)="signup()">

      <div class="mb-3">
        <input
          type="text"
          formControlName="fullName"
          class="form-control form-control-sm"
          placeholder="Full Name">
      </div>

      <div class="mb-3">
        <input
          type="email"
          formControlName="email"
          class="form-control form-control-sm"
          placeholder="Email">
      </div>

      <div class="mb-3">
        <input
          type="password"
          formControlName="password"
          class="form-control form-control-sm"
          placeholder="Password">
      </div>

      <button class="btn btn-primary w-100 mt-1 py-2 fw-semibold" type="submit">
        Create Account
      </button>
    </form>

    <!-- Divider -->
    <div class="text-center my-3 text-muted small">OR</div>

    <!-- GOOGLE SIGNUP BUTTON -->
    <button (click)="signupWithGoogle()" class="google-btn w-100 py-2 shadow-sm mb-2">
      <img
        src="https://developers.google.com/identity/images/g-logo.png"
        alt="Google Logo"
        class="google-icon">
      Sign up with Google
    </button>

    <!-- Login Link -->
    <p class="text-center text-muted mt-3 small">
      Already have an account?
      <a routerLink="/login" class="fw-semibold" style="cursor: pointer; text-decoration: none;">Log in</a>
    </p>

  </div>
</div>
