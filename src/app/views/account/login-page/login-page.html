<div class="login-wrapper d-flex flex-column justify-content-center align-items-center vh-100">

  <!-- Logo -->
  <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-3" />

  <h4 class="fw-bold text-center mb-1">Welcome Back</h4>
  <p class="text-center text-muted small mb-4">
    Log in to your Talent Hub account
  </p>

  <!-- LOGIN FORM -->
<form class="form-area" [formGroup]="loginForm" (ngSubmit)="onLogin()">
<div class="mb-3">
<app-input-fields  [form]="loginForm" type="email" placeholder="Email Address" controlName="email" height="45px"></app-input-fields>
</div>
<div class="mb-3">
<app-input-fields [form]="loginForm" type="password" placeholder="Password" controlName="password" height="45px"></app-input-fields>
</div>
<app-button class="w-100 " label="Login" variant="primary" type="submit" size="lg" [isLoading]="isLoading" [disabled]="loginForm.invalid"></app-button>


</form>

  <!-- SIGNUP -->
  <p class="text-center text-muted mt-3 small">
    Don’t have an account?
    <a href="/signup" class="fw-semibold login-link">Sign up</a>
  </p>

</div>
