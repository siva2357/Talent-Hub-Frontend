<div class="login-wrapper d-flex flex-column justify-content-center align-items-center vh-100">

  <!-- Logo -->
  <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-3" />

  <h4 class="fw-bold text-center mb-1">Welcome Back</h4>
  <p class="text-center text-muted small mb-4">
    Log in to your Talent Hub account
  </p>

  <!-- LOGIN FORM -->
  <form class="form-area">

    <!-- EMAIL -->
    <div class="form-group mb-3">
      <div class="input-group">
        <input
          id="email"
          type="email"
          placeholder="Email Address"
          class="form-control form-control-sm"
          style="height: 45px;"
        />
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="form-group mb-2">
      <div class="input-group">
        <input
          id="password"
          type="password"
          placeholder="Password"
          class="form-control form-control-sm"
          style="height: 45px;"
        />
      </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="text-end mb-3">
      <a href="/forgot-password" class="text-primary poppins-medium" style="font-size:12px;">
        Forgot Password?
      </a>
    </div>

    <!-- LOGIN BUTTON -->
    <button class="btn btn-primary w-100 fw-semibold py-2" type="submit">
      Login
    </button>

  </form>

  <!-- SIGNUP -->
  <p class="text-center text-muted mt-3 small">
    Don’t have an account?
    <a href="/signup" class="fw-semibold login-link">Sign up</a>
  </p>

</div>
