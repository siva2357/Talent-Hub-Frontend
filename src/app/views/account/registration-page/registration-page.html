<div class="auth-wrapper">
  <div class="auth-card text-center">
    <!-- Logo -->
    <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img" />

    <h4 class="fw-bold mb-2">Create {{ role === 'recruiter' ? 'Recruiter' : 'Job Seeker' }} Account</h4>
    <p class="text-muted small mb-4">Join Talent Hub to start your journey</p>

    <!-- FORM -->
    <form class="text-start" [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <app-input-fields
          [form]="form"
          controlName="fullName"
          height="50px"
          placeholder="Enter your full name">
        </app-input-fields>
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <app-input-fields
          [form]="form"
          controlName="email"
          type="email"
          height="50px"
          placeholder="Enter your email">
        </app-input-fields>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <app-input-fields
          [form]="form"
          controlName="password"
          type="password"
          height="50px"
          placeholder="Create a secure password">
        </app-input-fields>
      </div>

      <app-button
        label="Create Account"
        variant="primary"
        type="submit"
        size="lg"
        [isLoading]="isLoading"
        [disabled]="form.invalid"
        class="d-block w-100">
      </app-button>
    </form>

    <!-- LOGIN LINK -->
    <p class="text-center text-muted mt-4 mb-0 small">
      Already have an account?
      <a href="/login" class="login-link ms-1">Log in</a>
    </p>
  </div>
</div>
