<div class="container mt-4 mb-5">

  <div class="card p-4 shadow-sm">
    <h4 class="fw-bold mb-4">Seeker Profile Setup</h4>

    <!-- ================= PROFILE PHOTO ================= -->
    <h5 class="section-title mt-3">Profile Photo</h5>

    <div class="upload-box mb-4 text-center">
  <!-- PHOTO -->
<img
  src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1737957959/profie_images_j53njq.png"
  style="width:140px; height:160px; object-fit:cover; border-radius:8px; box-shadow:0 3px 10px rgba(0,0,0,0.1);"
  class="mb-3"
/>

  <div class="d-flex justify-content-center mt-2">
    <div class="progress w-50" style="height: 15px; border-radius: 50px;">
      <div
        class="progress-bar bg-success progress-bar-striped progress-bar-animated"
        role="progressbar"
        style="width: 100%;"
      ></div>
    </div>
  </div>

      <p class="mt-2 text-success fw-semibold">Photo uploaded successfully</p>
    </div>


    <!-- ================= BASIC DETAILS ================= -->
    <h5 class="section-title">Basic Details</h5>

    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" value="Siva" disabled>
      </div>

      <div class="col-md-4">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" value="Prasad" disabled>
      </div>

      <div class="col-md-4">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" value="example@gmail.com" disabled>
      </div>

      <div class="col-md-4">
        <label class="form-label">Mobile Number</label>
        <div class="d-flex gap-2">
          <input type="text" class="form-control" placeholder="Phone number">
          <button type="button" class="btn btn-outline-primary">Verify</button>
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label">Gender</label>
        <select class="form-select">
          <option selected disabled>Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
    </div>


    <!-- ================= WORK EXPERIENCE ================= -->
    <h5 class="section-title">Work Experience</h5>

    <div class="exp-card shadow-sm border rounded p-3 mb-3 bg-light">
      <div class="row g-3">

        <div class="col-md-4">
          <label class="form-label">Job Title</label>
          <input type="text" class="form-control" placeholder="Software Engineer">
        </div>

        <div class="col-md-4">
          <label class="form-label">Company</label>
          <input type="text" class="form-control" placeholder="Infosys, TCS">
        </div>

        <div class="col-md-4">
          <label class="form-label">Duration</label>
          <input type="text" class="form-control" placeholder="2021 - 2024">
        </div>

        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="2" placeholder="What did you work on?"></textarea>
        </div>

      </div>

      <div class="text-end mt-2">
        <button class="btn btn-danger btn-sm">Remove</button>
      </div>
    </div>

    <div class="text-start mb-4">
      <button class="btn btn-primary btn-sm">+ Add Experience</button>
    </div>


    <!-- ================= CERTIFICATIONS ================= -->
    <h5 class="section-title">Certifications</h5>

    <div class="cert-card shadow-sm border rounded p-3 mb-3 bg-light">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Certification Name</label>
          <input type="text" class="form-control" placeholder="AWS Solutions Architect">
        </div>

        <div class="col-md-6">
          <label class="form-label">Issued By</label>
          <input type="text" class="form-control" placeholder="AWS, Google">
        </div>

        <div class="col-md-6">
          <label class="form-label">Issued Date</label>
          <input type="date" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label">Certificate URL</label>
          <input type="text" class="form-control" placeholder="Optional link">
        </div>

      </div>

      <div class="text-end mt-2">
        <button class="btn btn-danger btn-sm">Remove</button>
      </div>
    </div>

    <div class="text-start mb-4">
      <button class="btn btn-primary btn-sm">+ Add Certification</button>
    </div>



    <!-- ================= LANGUAGES ================= -->
    <h5 class="section-title">Languages</h5>

    <div class="lang-card shadow-sm border rounded p-3 mb-3 bg-light">
      <div class="row g-3">

        <div class="col-md-4">
          <select class="form-select">
            <option selected disabled>Select Language</option>
            <option>English</option>
            <option>Hindi</option>
            <option>Telugu</option>
          </select>
        </div>

        <div class="col-md-4">
          <select class="form-select">
            <option selected disabled>Select Level</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Professional</option>
          </select>
        </div>

      </div>

      <div class="text-end mt-2">
        <button class="btn btn-danger btn-sm">Remove</button>
      </div>
    </div>

    <div class="text-start mb-4">
      <button class="btn btn-primary btn-sm">+ Add Language</button>
    </div>



    <!-- ================= SKILLS ================= -->
    <h5 class="section-title">Skills</h5>

    <div class="mb-4">
      <input type="text" class="form-control" placeholder="Type a skill & press Enter">

      <div class="mt-2">
        <span class="badge bg-primary px-3 py-2 me-2">Recruiting</span>
        <span class="badge bg-primary px-3 py-2">Screening</span>
      </div>
    </div>


<!-- ================= SOCIAL PROFILES ================= -->
<h5 class="section-title mt-4">Social Profiles</h5>

<!-- SOCIAL PROFILE CARD -->
<div class="social-card border rounded p-3 mb-3 shadow-sm bg-light">

  <div class="row g-3 align-items-end">

    <!-- Select Platform -->
    <div class="col-md-4">
      <label class="form-label">Platform</label>
      <select class="form-select">
        <option disabled selected>Select Platform</option>
        <option>LinkedIn</option>
        <option>GitHub</option>
        <option>Portfolio</option>
        <option>Twitter / X</option>
        <option>Instagram</option>
        <option>Facebook</option>
        <option>Dribbble</option>
        <option>Behance</option>
      </select>
    </div>

    <!-- Profile Link -->
    <div class="col-md-7">
      <label class="form-label">Profile Link</label>
      <input type="text" class="form-control" placeholder="Paste your social profile link">
    </div>

    <!-- Remove Button -->
    <div class="col-md-1 text-end">
      <button class="btn btn-danger w-100">X</button>
    </div>

  </div>
</div>

<!-- ADD BUTTON AT BOTTOM LEFT -->
<div class="text-start mb-4">
  <button class="btn btn-primary btn-sm">+ Add Profile</button>
</div>



    <!-- SUBMIT -->
    <div class="text-end mt-4">
      <button class="btn btn-success px-5 py-2" routerLink="/account-registered">Save Profile ✔</button>
    </div>

  </div>

</div>
