<div class="otp-wrapper d-flex flex-column justify-content-center align-items-center vh-100">

  <img
    src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
    class="logo mb-3"
    alt="Logo"
  />

  <h4 class="fw-bold mb-1 text-center">Verify Your Account</h4>

  <p class="text-muted small mb-4 text-center px-3">
    A verification code has been sent to
    <strong>{{ maskedEmail }}</strong>.
    Please enter the 6-digit code below.
  </p>

  <!-- OTP INPUTS -->
<div class="otp-box d-flex gap-2 mb-4 justify-content-center">
  @for (input of otpInputs; track $index; let i = $index) {
    <input
      type="text"
      maxlength="1"
      class="otp-input"
      [(ngModel)]="otp[i]"
      (input)="onInput($event, i)"
      (keydown)="onKeyDown($event, i)"
    />
  }
</div>

  <!-- ERROR -->
  @if (errorMessage) {
    <p class="text-danger small">{{ errorMessage }}</p>
  }

  <!-- VERIFY BUTTON -->
  <button
    class="btn btn-primary w-50 py-2 fw-semibold"
    [disabled]="otp.join('').length < 6 || loading"
    (click)="verify()"
  >
    {{ loading ? 'Verifying…' : 'Verify' }}
  </button>



</div>
