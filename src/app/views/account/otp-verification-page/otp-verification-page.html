<div class="auth-wrapper">
  <div class="auth-card p-4 p-sm-5 text-center">
    <!-- Logo -->
    <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-4" />

    <h4 class="fw-bold mb-2">Verify Your Account</h4>
    
    <p class="text-muted small mb-4">
      A verification code has been sent to<br>
      <strong class="text-dark">{{ email }}</strong>
    </p>

    <!-- OTP INPUTS -->
    <div class="otp-box">
      @for (item of otp; track i; let i = $index){
        <input
          type="text"
          maxlength="1"
          class="otp-input"
          [(ngModel)]="otp[i]"
          (input)="onInput($event, i)"
          (keydown.backspace)="onBackspace($event, i)"
        />
      }
    </div>

    <!-- ERROR -->
    @if (errorMsg) {
      <p class="text-danger small mb-3 fw-medium">
        <i class="bi bi-exclamation-circle me-1"></i> {{ errorMsg }}
      </p>
    }

    <!-- VERIFY BUTTON -->
    <app-button
      class="d-block w-100"
      label="Verify Account"
      size="lg"
      variant="primary"
      [isLoading]="isLoading"
      [disabled]="otp.join('').length !== 6"
      (click)="verifyOtp()">
    </app-button>

    <!-- RESEND -->
    <p class="text-center text-muted mt-4 mb-0 small">
      Didn't receive the code?
      <a (click)="resendOtp()" class="resend-link ms-1" style="cursor:pointer;">Resend Code</a>
    </p>
  </div>
</div>
