<div class="auth-wrapper">
  <div class="auth-card p-4 p-sm-5 text-center">
    <!-- Logo -->
    <img src="/assets/logo/website-logo.png" alt="Talent Hub" class="logo-img mb-4" />

    <h4 class="fw-bold mb-2">Forgot Password?</h4>
    <p class="text-muted small mb-4">
      Enter your registered email address. We’ll send you a verification code to reset your password.
    </p>

    <!-- FORM -->
    <form class="text-start" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="form-label small fw-semibold text-dark mb-1">Email Address</label>
        <app-input-fields 
          [form]="forgotForm"
          controlName="email"
          type="email" 
          placeholder="Enter your email" 
          height="48px">
        </app-input-fields>
      </div>

      <app-button 
        class="d-block w-100" 
        label="Send Verification Code" 
        variant="primary" 
        type="submit"
        size="lg"
        [disabled]="forgotForm.invalid">
      </app-button>
    </form>


    <!-- BACK TO LOGIN -->
    <p class="text-center text-muted mt-4 mb-0 small">
      Remember your password?
      <a href="/login" class="fw-semibold text-primary login-link ms-1">Login</a>
    </p>
  </div>
</div>
