<div class="fp-container d-flex flex-column justify-content-center align-items-center vh-100 ">

  <!-- Logo -->
  <img
    src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1764499024/Logo_no_background_ybka8q.png"
    class="logo mb-3"
    alt="Logo"
  />

  <h4 class="fw-bold mb-2">Forgot Password?</h4>

  <p class="text-muted small mb-4 text-center">
    Enter your registered email address. We will send you a verification code
    to reset your password.
  </p>

  <div class="fp-box p-4  bg-white rounded w-100" style="max-width: 380px;">

    <input
      type="email"
      [(ngModel)]="email"
      class="form-control  mb-3"
      placeholder="Enter your email"
    />

    <button class="btn btn-primary  fw-semibold py-2" (click)="sendOtp()">
      Send Verification Code
    </button>

  </div>

  <p class="text-muted small mt-3">
    Remember your password?
    <a routerLink="/login" class="fw-semibold">Login</a>
  </p>

</div>
