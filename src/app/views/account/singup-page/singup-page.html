<div class="auth-wrapper">
  <div class="auth-card p-4 p-sm-5 text-center">

    <img src="/assets/logo/website-logo.png" alt="Talent Hub Logo" class="logo-img mb-4"/>

    <h3 class="fw-bold mb-2">Create your account</h3>
    <p class="text-muted small mb-4">Select how you want to use Talent Hub</p>

    <div class="d-flex flex-column flex-sm-row gap-3 mt-2 mb-4">

      <div class="role-box" [class.active]="selectedRole === 'recruiter'" (click)="selectRole('recruiter')">
        <div class="d-flex justify-content-between align-items-center w-100 mb-2">
          <i class="bi bi-buildings text-primary fs-3"></i>
          <div class="circle" [class.active]="selectedRole === 'recruiter'"></div>
        </div>
        <span class="role-title">Recruiter</span>
        <p class="role-desc small text-muted">Hire top talent for your company</p>
      </div>

      <div class="role-box" [class.active]="selectedRole === 'jobSeeker'" (click)="selectRole('jobSeeker')">
        <div class="d-flex justify-content-between align-items-center w-100 mb-2">
          <i class="bi bi-person-badge text-primary fs-3"></i>
          <div class="circle" [class.active]="selectedRole === 'jobSeeker'"></div>
        </div>
        <span class="role-title">Job Seeker</span>
        <p class="role-desc small text-muted">Apply for jobs & get hired</p>
      </div>

    </div>

    @if (selectedRole) {
      <button class="btn btn-primary w-100 btn-lg fw-semibold" (click)="continue()">Continue as {{ selectedRole === 'recruiter' ? 'Recruiter' : 'Job Seeker' }}</button>
    } @else {
      <button class="btn btn-primary w-100 btn-lg fw-semibold opacity-50" disabled>Select a role to continue</button>
    }

    <!-- LOGIN -->
    <p class="text-center text-muted mt-4 mb-0 small">
      Already have an account?
      <a href="/login" class="fw-semibold text-primary login-link ms-1">Log in</a>
    </p>

  </div>
</div>
