<div class="signup-container d-flex flex-column justify-content-center align-items-center vh-100">

  <img src="/assets/logo/website-logo.png " alt="Talent Hub Logo" class="logo"/>

  <h3 class="fw-bold mt-3 mb-1">Create your account</h3>
  <p class="text-muted small">Select how you want to use Talent Hub</p>

  <div class="role-row mt-4">

    <div class="role-box"  [class.active]="selectedRole === 'recruiter'" (click)="selectRole('recruiter')">
      <div class="circle" [class.active]="selectedRole === 'recruiter'"></div>
      <span class="role-title">Recruiter</span>
      <p class="role-desc small text-muted">Hire talent for your company</p>
    </div>

    <div class="role-box" [class.active]="selectedRole === 'jobSeeker'" (click)="selectRole('jobSeeker')">
      <div class="circle" [class.active]="selectedRole === 'jobSeeker'"></div>
      <span class="role-title">Job Seeker</span>
      <p class="role-desc small text-muted">Apply for jobs & get hired</p>
    </div>

  </div>

  @if (selectedRole) {
    <button class="btn btn-outline-primary mt-4 px-5 py-2 fw-semibold" (click)="continue()">Create Account</button>
  }


</div>
