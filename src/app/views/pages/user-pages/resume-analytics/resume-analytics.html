<div class="container-xxl mt-5 pt-5">

  <h4 class="fw-semibold mb-4">Resume Analytics</h4>

  <!-- Upload Section -->
<!-- Upload Section -->
<div class="upload-box text-center mb-5">

  <!-- hidden file input -->
  <input type="file" id="resumeUpload" hidden>

  <!-- clickable upload icon -->
  <label for="resumeUpload" class="upload-click">

    <div class="upload-icon mb-3">
      <i class="bi bi-cloud-arrow-up"></i>
    </div>

    <h5 class="fw-semibold mb-1">Upload Your Resume</h5>

    <p class="text-muted small">
      Click the icon to upload your resume
    </p>

  </label>

</div>


<div class="row justify-content-center g-4">

  <div class="col-12  col-lg-9">

    <div class="resume-card">

      <div class="d-flex align-items-start gap-3">

        <div class="resume-icon">
          <i class="bi bi-file-earmark-text"></i>
        </div>

        <div class="resume-info flex-grow-1">

          <h6 class="resume-name">
            frontend-developer-resume.pdf
          </h6>

          <small class="text-muted">
            Uploaded on: Mar 14, 2026
          </small>

        </div>

      </div>

      <div class="resume-actions mt-4">

        <a
        class="ats-btn"
        routerLink="/resume-analytics/1/ats-report">
          Check Score
        </a>

        <button class="download-btn">
          <i class="bi bi-download me-1"></i>
          Download
        </button>

        <button class="delete-btn">
          Delete
        </button>

      </div>

    </div>

  </div>

</div>

</div>
