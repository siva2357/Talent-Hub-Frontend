<div class="dashboard-container p-4">
  <div class="dashboard-header mb-4">
    <h2 class="dashboard-title">Recruiter Dashboard</h2>
    <p class="dashboard-subtitle">Track your hiring progress and manage applicants efficiently.</p>
  </div>

  <!-- STATS CARDS -->
  <div class="row g-4 mb-4">
    @for (s of stats; track s.title) {
      <div class="col-md-4">
        <div class="card border-0 shadow-sm stat-card h-100">
          <div class="card-body p-4 d-flex flex-column justify-content-between">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="stat-icon" [style.background-color]="s.color + '15'" [style.color]="s.color">
                <i [class]="'bi ' + s.icon"></i>
              </div>
              <span class="trend-badge" [ngClass]="s.trend.startsWith('+') ? 'positive' : 'negative'">
                {{ s.trend }}
              </span>
            </div>
            <div>
              <h3 class="fw-bold mb-1">{{ s.value }}</h3>
              <p class="text-muted small fw-semibold mb-0">{{ s.title }}</p>
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- CHARTS SECTION -->
  <div class="row g-4 mb-4">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-transparent border-0 p-4 d-flex justify-content-between align-items-center">
          <h5 class="fw-bold mb-0">Application Trends</h5>
          <select class="form-select form-select-sm w-auto" [(ngModel)]="timeframe" (change)="onTimeframeChange()">
            <option value="Weekly">Weekly</option>
            <option value="Monthly">Monthly</option>
            <option value="Quarterly">Quarterly</option>
            <option value="Half Yearly">Half Yearly</option>
            <option value="Yearly">Yearly</option>
          </select>
        </div>
        <div class="card-body p-4 pt-0">
          <div class="chart-container">
            <canvas #statsChart></canvas>
          </div>
        </div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-transparent border-0 p-4">
          <h5 class="fw-bold mb-0">Hiring Pipeline</h5>
        </div>
        <div class="card-body p-4 pt-0 text-center">
          <div class="chart-container-donut">
            <canvas #pipelineChart></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LATEST APPLICANTS TABLE -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-transparent border-0 p-4 d-flex justify-content-between align-items-center">
      <h5 class="fw-bold mb-0">Latest Applicants</h5>
      <div class="d-flex gap-2">
        <button class="btn btn-light btn-sm text-primary fw-bold border-0">Export CSV</button>
        <a href="javascript:void(0)" class="btn btn-primary btn-sm fw-bold">View All</a>
      </div>
    </div>
    <div class="card-body p-0">
      <app-table 
        [columns]="applicantColumns" 
        [data]="applicantData"
        [selectable]="false">
      </app-table>
    </div>
  </div>
</div>

<!-- Table Templates -->
<ng-template #userTpl let-row>
  <div class="d-flex align-items-center gap-3 py-2">
    <img [src]="row.avatar" class="rounded-circle" width="40" height="40" alt="Avatar">
    <div>
      <div class="fw-bold text-dark">{{ row.name }}</div>
      <div class="text-muted small">{{ row.email }}</div>
    </div>
  </div>
</ng-template>

<ng-template #statusTpl let-row>
  <span class="badge rounded-pill px-3 py-2" [ngClass]="getStatusClass(row.status)">
    {{ row.status }}
  </span>
</ng-template>
