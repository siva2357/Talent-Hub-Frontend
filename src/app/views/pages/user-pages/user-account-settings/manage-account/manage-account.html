<h5 class="form-section-title text-danger"><i class="bi bi-exclamation-octagon"></i>Manage Account</h5>

<div class="card border-danger-subtle bg-danger-subtle bg-opacity-10 rounded-4 p-4 mb-4">
  <div class="d-flex gap-3">
    <i class="bi bi-trash3 text-danger fs-3"></i>
    <div>
      <h6 class="fw-bold text-danger mb-1">Delete Account</h6>
      <p class="text-muted small mb-3">
        Once you delete your account, there is no going back. This action is permanent 
        and will remove all your profile data, job applications, and history.
      </p>
      
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="confirmDelete" #confirmCheck>
        <label class="form-check-label small fw-semibold text-dark" for="confirmDelete">
          I understand the consequences and I want to delete my account.
        </label>
      </div>

      <button 
        class="btn btn-danger px-4 py-2 rounded-3 fw-bold small" 
        [disabled]="!confirmCheck.checked || loading"
        (click)="deleteAccount()">
        @if(loading) {
          <span class="spinner-border spinner-border-sm me-2"></span> Deleting...
        } @else {
          Delete My Account Permanently
        }
      </button>
    </div>
  </div>
</div>

<div class="card border-0 bg-light rounded-4 p-4">
  <h6 class="fw-bold text-dark mb-1">Export Your Data</h6>
  <p class="text-muted small mb-3">
    Download all your profile information and history for your records.
  </p>
  <button class="btn btn-outline-primary px-4 py-2 rounded-3 fw-bold small d-inline-flex align-items-center gap-2" style="width: fit-content;">
    <i class="bi bi-download"></i> Request Data Export
  </button>
</div>
