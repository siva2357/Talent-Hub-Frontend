<div class="settings-page">
  <div class="container py-5">
    
    <!-- HEADER -->
    <div class="d-flex align-items-center mb-5 gap-3">
      <button class="btn btn-white border shadow-sm rounded-circle p-2 back-btn" (click)="goBack()">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div>
        <h3 class="fw-bold text-dark mb-1">Account Settings</h3>
        <p class="text-muted small mb-0">Manage your profile, security, and account preferences.</p>
      </div>
    </div>

    <div class="row g-4">
      <!-- SIDEBAR NAVIGATION -->
      <div class="col-lg-3">
        <div class="settings-sidebar card border-0 shadow-sm p-3">
          <nav class="nav flex-column gap-2">
            <button class="nav-link-custom" [class.active]="activeTab === 'basic'" (click)="setTab('basic')">
              <i class="bi bi-person-circle"></i> Basic Information
            </button>
            <button class="nav-link-custom" [class.active]="activeTab === 'profile'" (click)="setTab('profile')">
              <i class="bi bi-image"></i> Profile Photo
            </button>
            <button class="nav-link-custom" [class.active]="activeTab === 'professional'" (click)="setTab('professional')">
              <i class="bi bi-briefcase"></i> Professional Details
            </button>
            <hr class="my-2 opacity-10">
            <button class="nav-link-custom" [class.active]="activeTab === 'security'" (click)="setTab('security')">
              <i class="bi bi-shield-lock"></i> Security & Password
            </button>
            <button class="nav-link-custom danger" [class.active]="activeTab === 'manage'" (click)="setTab('manage')">
              <i class="bi bi-gear-wide-connected"></i> Manage Account
            </button>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT AREA -->
      <div class="col-lg-9">
        <div class="settings-content-card card border-0 shadow-sm p-4 p-md-5">
          @if (activeTab === 'basic') {
            <app-update-basic-details></app-update-basic-details>
          }
          @if (activeTab === 'profile') {
            <app-update-profile-details></app-update-profile-details>
          }
          @if (activeTab === 'professional') {
            <app-update-professional-details></app-update-professional-details>
          }
          @if (activeTab === 'security') {
            <app-update-change-password></app-update-change-password>
          }
          @if (activeTab === 'manage') {
            <app-manage-account></app-manage-account>
          }
        </div>
      </div>
    </div>

  </div>
</div>
