<h5 class="form-section-title"><i class="bi bi-person-badge-fill text-primary"></i>Identity & Contact</h5>

@if (isLoading) {
  <div class="d-flex flex-column align-items-center justify-content-center py-5">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <p class="text-muted small">Fetching your information...</p>
  </div>
} @else {
  <form [formGroup]="form" (ngSubmit)="updateProfile()">
    <div class="card border-0 bg-white rounded-4 p-4 shadow-sm mb-4 border border-light">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label d-flex align-items-center gap-2 small fw-bold text-dark mb-2">
            <i class="bi bi-envelope text-primary"></i> Email Address
          </label>
          <app-input-fields [form]="form" controlName="email" type="email" placeholder="Email" height="48px" [readonly]="true"></app-input-fields>
          <p class="text-muted smallest mt-2">Primary email for notifications and login.</p>
        </div>
        
        <div class="col-md-6">
          <label class="form-label d-flex align-items-center gap-2 small fw-bold text-dark mb-2">
            <i class="bi bi-phone text-primary"></i> Mobile Number
          </label>
          <app-input-fields [form]="form" controlName="mobile" placeholder="Mobile Number" height="48px"></app-input-fields>
        </div>

        <div class="col-md-12">
          <label class="form-label d-flex align-items-center gap-2 small fw-bold text-dark mb-2">
            <i class="bi bi-gender-ambiguous text-primary"></i> Gender Preference
          </label>
          <app-input-fields [form]="form" controlName="gender" [isSelect]="true" [options]="['Male', 'Female', 'Other']" height="48px"></app-input-fields>
        </div>
      </div>
    </div>

    <div class="card border-0 bg-white rounded-4 p-4 shadow-sm mb-4 border border-light">
      <h6 class="fw-bold text-dark mb-4 d-flex align-items-center gap-2">
        <i class="bi bi-journal-text text-primary"></i> Bio & Description
      </h6>
      <div class="row g-4">
        <div class="col-12">
          <label class="form-label small fw-bold text-dark mb-2">About You</label>
          <app-input-fields [form]="form" controlName="bioDescription" [isTextarea]="true" placeholder="Briefly describe your professional background, goals, or interests..."></app-input-fields>
        </div>
      </div>
    </div>

    <div class="settings-footer sticky-bottom bg-white py-3 border-top">
      <app-button label="Save Identity Updates" type="submit" variant="primary" size="lg" [isLoading]="isSaving" [disabled]="form.invalid || isSaving"></app-button>
    </div>
  </form>
}
