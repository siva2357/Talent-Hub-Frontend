<div class="container-xxl mt-5 pt-5">


  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0">Saved Talents</h5>
  </div>

<div class="filter-toolbar">

  <div class="row g-3 align-items-center">

    <!-- Search -->
     <div class="col-xl-3 col-lg-4 col-md-12">
      <input
        type="text"
        class="form-control filter-input"
        placeholder="Search talent..."
      >
    </div>

    <!-- Location -->
   <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Location</option>
        <option>Hyderabad</option>
        <option>Bangalore</option>
        <option>Mumbai</option>
        <option>Delhi</option>
        <option>Chennai</option>
        <option>Pune</option>
        <option>Remote</option>
      </select>
    </div>

    <!-- Experience -->
    <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Experience</option>
        <option>0 - 1 Years</option>
        <option>1 - 3 Years</option>
        <option>3 - 5 Years</option>
        <option>5 - 8 Years</option>
        <option>8+ Years</option>
      </select>
    </div>

    <!-- Category -->
   <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Category</option>
        <option>Frontend</option>
        <option>Backend</option>
        <option>Full Stack</option>
        <option>Mobile</option>
        <option>DevOps</option>
        <option>AI / ML</option>
        <option>UI / UX</option>
      </select>
    </div>


    <!-- Buttons -->
    <div class="col-xl-3 col-lg-4 col-md-12 d-flex gap-2">

      <button class="btn btn-primary filter-btn w-100">
        Apply
      </button>

      <button class="btn btn-outline-secondary filter-btn w-100">
        Reset
      </button>

    </div>

  </div>

</div>




<div class="row g-4">

@for(talent of talents; track talent.email){

<div class="col-12 col-md-6 col-xl-3">

<div class="talent-card">

<!-- COVER -->
<div class="talent-cover">

<img src="https://res.cloudinary.com/dpp8aspqs/image/upload/v1735368347/pngtree-vibrant-pastel-texture-trendy-abstract-holographic-background-image_13893921_bzlbdr.png" class="cover-img">

<button class="bookmark-btn">
<i class="bi bi-bookmark-fill text-primary"></i>
</button>

</div>

<!-- AVATAR -->
<div class="talent-avatar">
<img [src]="talent.avatar">
</div>

<div class="talent-info">

<div class="talent-status mb-3">

@if(talent.status === 'Active'){
<span class="badge bg-success">Active</span>
}
@else{
<span class="badge bg-danger">Inactive</span>
}

</div>

<h6 class="fw-semibold mb-1">{{talent.name}}</h6>

<p class="talent-role">
{{talent.role}}
</p>

<div class="talent-contact">

<span>
<i class="bi bi-envelope"></i>
{{talent.email}}
</span>

<span>
<i class="bi bi-telephone"></i>
{{talent.phone}}
</span>

</div>

<div class="talent-location">
<i class="bi bi-geo-alt"></i>
{{talent.location}}
</div>

</div>

<div class="view-profile-btn">
<button class="btn btn-primary btn-sm">
View Profile
</button>
</div>

</div>

</div>

}

</div>



<div class="table-footer d-none d-lg-block mb-5">

  <div class="footer-wrapper">

    <small class="result-text">
      Showing <strong>1–10</strong> of <strong>100</strong> recruiters
    </small>

    <nav>
      <ul class="pagination pagination-sm custom-pagination mb-0">

        <li class="page-item disabled">
          <a class="page-link">
            <i class="bi bi-chevron-left"></i>
          </a>
        </li>

        <li class="page-item active">
          <a class="page-link">1</a>
        </li>

        <li class="page-item">
          <a class="page-link">2</a>
        </li>

        <li class="page-item">
          <a class="page-link">
            <i class="bi bi-chevron-right"></i>
          </a>
        </li>

      </ul>
    </nav>

  </div>

</div>


</div>
