<div class="container-xxl mt-5 pt-5">
<h5 style=" font-weight:600;">Analytics</h5>

<div class="row g-3">

@for (card of dashboardCards; track card.title) {
  <div class="col-12 col-md-6 col-xl-3">

    <div class="card border rounded-0 h-100">
      <div class="card-body">

        <div class="d-flex justify-content-between align-items-center">
          <h6 class="mb-0">{{ card.title }}</h6>
        </div>

        <!-- ✅ correct value -->
        <h5 class="mt-2">{{ card.total }}</h5>

        <p class="text-muted small mb-0">
          {{ card.description }}
        </p>

      </div>
    </div>

  </div>
}
</div>

<div class="col-12 mt-3">

  <div class="card border rounded-0 shadow-sm">
    <div class="card-body p-4">

      <!-- Header -->
<div class=" mb-4">
  <h6 style="margin:0; font-weight:600;">Job Platform Analytics</h6>

</div>

      <!-- Metrics -->
<div class="row g-3 text-center mb-4">

  <div class="col-6 col-md">
    <div class="card border rounded-0 analytics-metric">
      <div class="card-body">
        <h5 class="metric-value text-primary">{{ totalJobs }}</h5>
        <p class="metric-label">Total Jobs</p>
      </div>
    </div>
  </div>

  <div class="col-6 col-md">
    <div class="card border rounded-0 analytics-metric">
      <div class="card-body">
        <h5 class="metric-value">{{ totalApplications }}</h5>
        <p class="metric-label">Applications</p>
      </div>
    </div>
  </div>

  <div class="col-6 col-md">
    <div class="card border rounded-0 analytics-metric">
      <div class="card-body">
        <h5 class="metric-value text-success">{{ totalHired }}</h5>
        <p class="metric-label">Hired</p>
      </div>
    </div>
  </div>

  <div class="col-6 col-md">
    <div class="card border rounded-0 analytics-metric">
      <div class="card-body">
        <h5 class="metric-value text-danger">{{ totalRejected }}</h5>
        <p class="metric-label">Rejected</p>
      </div>
    </div>
  </div>

</div>

<app-table
  [columns]="trendColumns"
  [data]="trendData">
</app-table>


    </div>
  </div>

</div>


</div>
