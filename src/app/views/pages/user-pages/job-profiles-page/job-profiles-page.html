<div class="container-xxl mt-5 pt-5">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0">Jobs for you</h5>
  </div>



<div class="filter-toolbar">

  <div class="row g-3 align-items-center">

    <!-- Search -->


          <div class="col-xl-3 col-lg-4 col-md-12">
<input
  type="text"
  class="form-control filter-input"
  placeholder="Search job title..."
  [(ngModel)]="searchText">
    </div>


    <!-- Category -->
    <div class="col-xl-2 col-lg-3 col-md-6">
<select class="form-select filter-select" [(ngModel)]="selectedCategory">
  <option value="">Category</option>

  @for (cat of categories; track cat) {
    <option [value]="cat ">{{ cat  }}</option>
  }
</select>
    </div>

    <!-- Job Type -->
        <div class="col-xl-2 col-lg-3 col-md-6">
<select class="form-select filter-select" [(ngModel)]="selectedJobtype">
  <option value="">Job Type</option>

  @for (type of jobTypes; track type) {
    <option [value]="type">{{ type  }}</option>
  }
</select>
    </div>


    <div class="col-xl-2 col-lg-3 col-md-6">
<select class="form-select filter-select" [(ngModel)]="selectedLocation">
  <option value="">Location</option>

  @for (loc of locations; track loc) {
    <option [value]="loc">{{ loc  }}</option>
  }
</select>
    </div>

    <!-- Buttons -->
    <div class="col-xl-3 col-lg-4 col-md-12 d-flex gap-2">
      <app-button variant="primary" label="Apply" size="md" class="w-100"   (click)="applyFilters()"></app-button>
      <app-button variant="secondary" label="Reset" size="md" class="w-100" (click)="resetFilters()"></app-button>

    </div>

  </div>

        @if (getActiveFilters().length > 0) {
  <div class="d-flex flex-wrap gap-2 mt-3">

    @for (f of getActiveFilters(); track f.key) {
      <span class="badge badge-primary d-flex align-items-center gap-2 px-3 py-2">

        {{ f.label }}

        <i
          class="bi bi-x-lg"
          style="cursor:pointer; font-size:12px;"
          (click)="removeFilter(f.key)">
        </i>

      </span>
    }

  </div>
}


</div>



<div class="row g-4">

@for(job of paginatedJobPosts; track job._id){

<div class="col-12 col-md-6 col-xl-4">

<div class="job-card p-3">

<div class="d-flex justify-content-between align-items-start">

<div class="d-flex gap-3 align-items-center">

<img [src]="job.logo" class="company-logo">

<div>

<div class="fw-semibold job-title">{{job.title}} - {{job.jobId}}</div>
<div class="text-muted small">{{job.company}}</div>

</div>

</div>

<i
  class="bi bookmark-icon"
  [ngClass]="job.isSaved ? 'bi-bookmark-fill text-primary' : 'bi-bookmark'"
    (click)="toggleSave(job)">
</i>

</div>

<p class="job-desc">
{{job.description}}
</p>


<div class="job-meta mt-3">

<span class="job-badge">
<i class="bi bi-briefcase me-1"></i>
{{job.category}}
</span>

<span class="job-badge">
<i class="bi bi-clock me-1"></i>
{{job.type}}
</span>

<span class="job-badge">
<i class="bi bi-geo-alt me-1"></i>
{{job.location}}
</span>

</div>


<!-- ACTION BUTTON -->
<div class="pt-3">
<app-button label="View Job" variant="primary" [routerLink]="['/user/jobprofile', job._id, 'job-details']"></app-button>
</div>


</div>

</div>

}

</div>


<app-pagination [total]="total" [page]="page" [limit]="limit" (pageChange)="onPageChange($event)" (limitChange)="onLimitChange($event)"></app-pagination>

</div>
