<div class="container-xxl mt-5 pt-5">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0">Your saved jobposts</h5>
  </div>



<div class="filter-toolbar">

  <div class="row g-3 align-items-center">

    <!-- Search -->
    <div class="col-xl-3 col-lg-4 col-md-12">
      <input
        type="text"
        class="form-control filter-input"
        placeholder="Search job title..."
      >
    </div>

    <!-- Category -->
    <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Category</option>
        <option>Frontend</option>
        <option>Backend</option>
        <option>Full Stack</option>
        <option>Data Science</option>
        <option>DevOps</option>
      </select>
    </div>

    <!-- Job Type -->
    <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Job Type</option>
        <option>Full Time</option>
        <option>Part Time</option>
        <option>Contract</option>
        <option>Internship</option>
      </select>
    </div>

    <!-- Status -->
  <div class="col-xl-2 col-lg-3 col-md-6">
      <select class="form-select filter-select">
        <option selected>Location</option>
        <option>Hyderabad</option>
        <option>Bangalore</option>
        <option>Mumbai</option>
        <option>Delhi</option>
        <option>Chennai</option>
        <option>Pune</option>
        <option>Remote</option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="col-xl-3 col-lg-4 col-md-12 d-flex gap-2">

      <button class="btn btn-primary filter-btn w-100">
        Apply
      </button>

      <button class="btn btn-outline-secondary filter-btn w-100">
        Reset
      </button>

    </div>

  </div>

</div>



<div class="row g-4">

@for(job of jobs; track job.id){

<div class="col-12 col-md-6 col-xl-4">

<div class="job-card p-3">

<div class="d-flex justify-content-between align-items-start">

<div class="d-flex gap-3 align-items-center">

<img [src]="job.logo" class="company-logo">

<div>

<div class="fw-semibold job-title">{{job.title}} - {{job.jobId}}</div>
<div class="text-muted small">{{job.company}}</div>

</div>

</div>

<i class="bi bi-bookmark-fill bookmark-icon"></i>

</div>

<p class="job-desc">
{{job.description}}
</p>


<div class="job-meta mt-3">

<span class="job-badge">
<i class="bi bi-briefcase me-1"></i>
{{job.category}}
</span>

<span class="job-badge">
<i class="bi bi-clock me-1"></i>
{{job.type}}
</span>

<span class="job-badge">
<i class="bi bi-geo-alt me-1"></i>
{{job.location}}
</span>

</div>


<!-- ACTION BUTTON -->
<div class="mt-auto pt-3 d-flex gap-2">

<button class="view-job-btn" [routerLink]="['/jobprofile/:id/job-details']">
View Job
</button>

<button class="apply-btn">
Apply Now
</button>

</div>


</div>

</div>

}

</div>



<div class="table-footer  mb-5">

  <div class="footer-wrapper">

    <small class="result-text">
      Showing <strong>1–10</strong> of <strong>100</strong> recruiters
    </small>

    <nav>
      <ul class="pagination pagination-sm custom-pagination mb-0">

        <li class="page-item disabled">
          <a class="page-link">
            <i class="bi bi-chevron-left"></i>
          </a>
        </li>

        <li class="page-item active">
          <a class="page-link">1</a>
        </li>

        <li class="page-item">
          <a class="page-link">2</a>
        </li>

        <li class="page-item">
          <a class="page-link">
            <i class="bi bi-chevron-right"></i>
          </a>
        </li>

      </ul>
    </nav>

  </div>

</div>


</div>
