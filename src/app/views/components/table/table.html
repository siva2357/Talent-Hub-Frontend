
  <div class="table-responsive table-card">

    <table class="table align-middle clean-table">

      <thead>
        <tr>
          @for (col of columns; track col.name) {
            <th [class.text-center]="col.center">{{ col.name }}</th>
          }
        </tr>
      </thead>

      <tbody>

        @for (row of data; track row._id; let i = $index) {
          <tr>

            @for (col of columns; track col.name) {
              <td [class.text-center]="col.center">
                @if (col.type === 'index') {
                  {{ i + 1 }}
                }
                @else if (col.template) {
                  <ng-container *ngTemplateOutlet="col.template; context: { $implicit: row }"> </ng-container>
                }


                @else {
                  {{ row[col.prop] }}
                }

              </td>
            }

          </tr>
        }

      </tbody>

    </table>

    <!-- EMPTY -->
    @if (!data.length) {
      <div class="text-center py-3 text-muted">
        No data available
      </div>
    }

  </div>
