<div class="saved-talent-page p-3 p-md-4 p-xl-5">
  <div class="container-fluid max-w-7xl mx-auto">

    <div class="mb-5 text-center text-md-start">
      <h3 class="text-white fw-bold mb-3 h4">Saved Talent</h3>
      <p class="text-secondary mb-0">Freelancers you have bookmarked for future projects.</p>
    </div>

    @if (savedTalents.length === 0) {
    <div class="glass p-5 rounded-4 text-center">
      <i class="bi bi-bookmark-heart text-secondary opacity-25 fs-1 mb-3"></i>
      <h4 class="text-white fw-bold">No saved talent yet</h4>
      <p class="text-secondary">Browse the marketplace and bookmark freelancers you like.</p>
      <app-button variant="primary" customClass="mt-3 px-4" routerLink="/user/search-talent">Find Talent</app-button>
    </div>
    } @else {
    <div class="row g-4">
      @for (talent of savedTalents; track talent.id) {
      <div class="col-lg-4 col-md-6">
        <app-talent-card
          [name]="talent.name"
          [avatar]="talent.avatar"
          [location]="talent.location"
          [role]="talent.role"
          [performance]="talent.performance"
          [performanceTier]="talent.performanceTier"
          [skills]="talent.skills"
          [stats]="talent.stats"
          (nameClick)="viewProfile(talent.id)">
          <div timeline class="d-flex align-items-center gap-2 mb-3">
            <span class="text-secondary text-xs">Saved {{talent.dateSaved}}</span>
          </div>
          <div actions class="d-flex gap-2" (click)="$event.stopPropagation()">
            <app-button variant="outline" size="sm" customClass="px-2 border-opacity-25 border-primary"
              (click)="unsaveTalent(talent.id, $event)">
              <i class="bi bi-bookmark-fill text-primary"></i>
            </app-button>
            <app-button variant="primary" size="sm" customClass="px-3 rounded-3" (click)="viewProfile(talent.id)">
              View Profile &rarr;
            </app-button>
          </div>
        </app-talent-card>
      </div>
      }
    </div>
    }
  </div>
</div>
