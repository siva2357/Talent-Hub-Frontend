<div class="contract-view-page p-3 p-md-4 p-xl-5">
  <div class="container max-w-7xl mx-auto">
    
    <div class="mb-5">
      <button class="btn btn-link text-secondary text-decoration-none p-0 mb-3" onclick="history.back()">
        <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
      </button>
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
          <h2 class="text-white fw-bold mb-1">{{contract.title}}</h2>
          <p class="text-secondary mb-0">Hired <span class="text-primary fw-medium">{{contract.freelancer}}</span></p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary rounded-pill px-4">Message</button>
          <button class="btn btn-outline-light rounded-pill px-4 bg-glass">End Contract</button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Left Column: Details -->
      <div class="col-12 col-lg-8">
        <div class="glass p-4 p-md-5 rounded-4 mb-4">
          <h5 class="text-white fw-bold mb-4">Project Overview</h5>
          <p class="text-secondary lh-lg mb-0">{{contract.description}}</p>
        </div>

        <div class="glass p-4 p-md-5 rounded-4">
          <h5 class="text-white fw-bold mb-4">Recent Updates</h5>
          <div class="update-list">
            @for (upd of contract.updates; track upd.id) {
            <div class="update-item pb-4 mb-4 border-bottom border-white border-opacity-5">
              <span class="text-primary small fw-bold d-block mb-1">{{upd.date}}</span>
              <p class="text-secondary mb-0">{{upd.text}}</p>
            </div>
            }
          </div>
        </div>
      </div>

      <!-- Right Column: Stats -->
      <div class="col-12 col-lg-4">
        <div class="glass p-4 rounded-4 mb-4 text-center">
          <p class="text-secondary small fw-medium mb-1 text-uppercase">Budget Consumption</p>
          <h2 class="text-white fw-bold mb-3">{{contract.spent}} / {{contract.totalBudget}}</h2>
          <div class="progress bg-white bg-opacity-5" style="height: 10px;">
            <div class="progress-bar bg-primary rounded-pill shadow-glow" 
                 role="progressbar" 
                 style="width: 35%"></div>
          </div>
        </div>

        <div class="glass p-4 rounded-4">
          <h5 class="text-white fw-bold mb-4">Quick Actions</h5>
          <div class="d-grid gap-3">
            <button class="btn btn-dark text-white border-white border-opacity-10 py-2 rounded-3 text-start px-3">
              <i class="bi bi-file-earmark-pdf me-2"></i> View Contract PDF
            </button>
            <button class="btn btn-dark text-white border-white border-opacity-10 py-2 rounded-3 text-start px-3">
              <i class="bi bi-clock me-2"></i> Review Timesheets
            </button>
            <button class="btn btn-dark text-white border-white border-opacity-10 py-2 rounded-3 text-start px-3">
              <i class="bi bi-credit-card me-2"></i> Make a Payment
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
