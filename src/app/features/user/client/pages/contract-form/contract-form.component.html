<div class="contract-form-page p-3 p-md-4 p-xl-5 position-relative">

  <!-- BACK BUTTON -->
  <a routerLink="/user/your-contracts"
    class="btn-back-nav rounded-circle d-flex align-items-center justify-content-center position-absolute top-0 start-0 m-4 shadow-lg z-3"
    title="Back to Contracts">
    <i class="bi bi-arrow-left fs-4"></i>
  </a>

  <div class="container max-w-4xl mx-auto">

    <!-- HEADER -->
    <div class="mb-5 text-center text-md-start">

      <h2 class="text-white fw-bold mb-2">
        {{ mode === 'create'? 'Create New Contract' : 'Update Contract' }}
      </h2>

      <p class="text-secondary mb-0"> Fill all contract details properly.</p>

    </div>

    <!-- FORM -->
    <form [formGroup]="contractForm" (ngSubmit)="onSubmit()" class="glass p-4 p-md-5 rounded-4 shadow-lg">

      <div class="row g-4">

        <!-- CONTRACT TITLE -->
        <div class="col-12">

          <app-input type="text" label="Contract Title" placeholder="Enter Contract Title" icon="bi-briefcase-fill" formControlName="contractTitle" [required]="true" [error]="
              f['contractTitle'].touched && f['contractTitle'].errors?.['required'] ? 'Contract title is required'  : '' ">
          </app-input>

        </div>

        <!-- BUDGET TYPE -->
        <div class="col-12 col-md-6">

          <app-input type="select" label="Budget Type" placeholder="Select Budget Type" icon="bi-cash-stack" formControlName="budgetType" [options]="budgetTypeOptions" [required]="true"> </app-input>

        </div>

        <!-- ESTIMATED BUDGET -->
        <div class="col-12 col-md-6">

          <app-input type="text" label="Estimated Budget (₹)" placeholder="Enter Estimated Budget" icon="bi-currency-rupee" formControlName="estimatedBudget" [required]="true" [error]="
              f['estimatedBudget'].touched && f['estimatedBudget'].errors?.['required'] ? 'Estimated budget is required' :
              f['estimatedBudget'].touched && (f['estimatedBudget'].errors?.['min'] || f['estimatedBudget'].errors?.['max']) ? 'Budget must be between ₹25,000 and ₹75,000' : ''">
          </app-input>

        </div>

        <!-- CONTRACT TYPE -->
        <div class="col-12 col-md-6">

          <app-input type="select" label="Contract Type" placeholder="Select Contract Type" icon="bi-tags-fill" formControlName="contractType" [options]="contractTypeOptions" [required]="true"> </app-input>

        </div>

        <!-- CONTRACT SUBJECT -->
        <div class="col-12 col-md-6">

          <app-input type="select" label="Contract Subject" placeholder="Select Contract Subject" icon="bi-journal-bookmark-fill" formControlName="contractSubject" [options]="contractSubjectOptions" [required]="true"> </app-input>

        </div>

        <!-- START DATE -->
        <div class="col-12 col-md-6">

          <app-input type="date" label="Contract Start Date" icon="bi-calendar-event" formControlName="contractStartDate" [required]="true" [error]="
              f['contractStartDate'].touched && f['contractStartDate'].errors?.['required'] ? 'Start date is required' : '' ">
          </app-input>

        </div>

        <!-- END DATE -->
        <div class="col-12 col-md-6">

          <app-input type="date" label="Contract End Date" icon="bi-calendar-check" formControlName="contractEndDate" [required]="true" [error]="
              f['contractEndDate'].touched && f['contractEndDate'].errors?.['required'] ? 'End date is required' : ''">
          </app-input>

        </div>

        <!-- STATUS -->
        <div class="col-12">

          <app-input type="select" label="Contract Status" placeholder="Select Contract Status" icon="bi-check-circle-fill" formControlName="status" [options]="statusOptions" [required]="true"> </app-input>

        </div>

        <!-- DESCRIPTION -->
        <div class="col-12">

          <app-rich-text-editor label="Contract Description" placeholder="Write complete contract details here..." formControlName="contractDescription" [required]="true" [error]="
              f['contractDescription'].touched && f['contractDescription'].errors?.['required'] ? 'Description is required' : '' ">
          </app-rich-text-editor>

        </div>

        <!-- SUBMIT -->
        <!-- ACTION BUTTONS -->
        <div class="col-12 pt-3">

          <div class="d-flex justify-content-between align-items-center gap-3">

            <!-- LEFT BUTTON -->
            <app-button type="button" variant="outline" size="sm" customClass="rounded-3 py-3 px-4 " routerLink="/user/your-contracts">
              {{ mode === 'create' ? 'Cancel' : 'Discard Changes'}}
            </app-button>

            <!-- RIGHT BUTTON -->
            <app-button type="submit" variant="primary" size="sm" customClass="rounded-3 py-3 px-4 " [loading]="loading">
              {{ mode === 'create' ? 'Post Contract' : 'Update Contract'}}
            </app-button>

          </div>

        </div>

      </div>

    </form>

  </div>

</div>
