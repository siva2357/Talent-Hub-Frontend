<div class="auth-container">
    <!-- BACKGROUND BLOBS -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-card-wrapper">
        <div class="auth-card glass text-center p-4">
            <!-- LOGO -->
            <div class="logo-container mb-4">
                <img src="assets/logo/website-logo.png" alt="Talent Hub" class="auth-logo">
            </div>

            <!-- TITLE & DESC -->
            <div class="auth-header mb-4">
                <h4 class="fw-bold text-white mb-2">Reset Password</h4>
                <p class="text-sm opacity-60 px-4">
                    Enter your email address and we will send you a code to reset your password.
                </p>
            </div>

            <!-- ERROR/SUCCESS ALERTS -->
            @if (errorMessage) {
            <div class="alert alert-danger text-xs py-2 px-3 border-0 rounded-3 d-flex align-items-center gap-2 mb-3"
              style="background: rgba(239, 68, 68, 0.15); color: #ff4d4f; border: 1px solid rgba(239, 68, 68, 0.3) !important;">
              <i class="bi bi-exclamation-octagon-fill"></i>
              <span>{{ errorMessage }}</span>
            </div>
            }
            @if (successMessage) {
            <div class="alert alert-success text-xs py-2 px-3 border-0 rounded-3 d-flex align-items-center gap-2 mb-3"
              style="background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3) !important;">
              <i class="bi bi-check-circle-fill"></i>
              <span>{{ successMessage }}</span>
            </div>
            }

            <!-- FORM -->
            <form (ngSubmit)="onSubmit()" class="auth-form text-start mb-4">
                <div class="mb-4">
                    <app-input type="email" placeholder="Enter your email address" icon="bi-envelope"
                        [(ngModel)]="email" name="email" [disabled]="isLoading">
                    </app-input>
                </div>

                <div class="text-center">
                    <app-button type="submit" variant="primary" size="md" [disabled]="isLoading || !email" [loading]="isLoading"
                        customClass="w-100 py-2 d-inline-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-send text-lg"></i>
                        <span class="text-md">Send Code</span>
                    </app-button>
                </div>
            </form>

            <!-- FOOTER -->
            <div class="auth-footer">
                <p class="text-sm opacity-70">
                    Remember your password?
                    <a routerLink="/account/signin" class="text-brand text-decoration-none fw-medium hover-underline">Go
                        back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
