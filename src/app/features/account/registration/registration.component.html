<div class="auth-container">
  <!-- BACKGROUND BLOBS -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card-wrapper">
    <div class="auth-card glass">
      <!-- LOGO -->
      <div class="logo-container">
        <img src="assets/logo/website-logo.png" alt="Talent Hub" class="auth-logo">
      </div>

      <div class="auth-header">
        <h1 class="text-2xl fw-bold ">Create Account</h1>
      </div>

      <form [formGroup]="registrationForm" (ngSubmit)="onRegister()" class="auth-form">
        <!-- FULL NAME -->
        <div class="mb-1">
          <app-input type="text" placeholder="Enter your full name" icon="bi-person" formControlName="fullName"
            [error]="getFullNameError()">
          </app-input>
        </div>

        <!-- EMAIL -->
        <div class="mb-1">
          <app-input type="email" placeholder="Enter your email" icon="bi-envelope" formControlName="email"
            [error]="getEmailError()">
          </app-input>
        </div>

        <!-- PASSWORD -->
        <div class="mb-1">
          <app-input type="password" placeholder="Enter your password" icon="bi-lock" [showPasswordToggle]="true"
            formControlName="password" [error]="getPasswordError()">
          </app-input>
        </div>

        <!-- GATEWAY ERROR MESSAGE -->
        @if (registrationError) {
        <div class="alert alert-danger py-2 px-3 mb-3 text-sm d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>{{ registrationError }}</span>
        </div>
        }

        <div class="auth-action mt-4">
          <app-button type="submit" variant="primary" size="md" customClass="w-100"
            [disabled]="registrationForm.invalid || isLoading" [loading]="isLoading">
            Register
          </app-button>
        </div>
      </form>

      <div class="auth-footer mt-4 text-center">
        <p class="text-xs opacity-70 mb-3">
          Already have an account?
          <a routerLink="/account/signin" class="text-brand fw-semibold text-decoration-none">Login</a>
        </p>

        <!-- BACK TO HOME (INSIDE CARD) -->
        <div class="back-home mt-3">
          <a routerLink="/"
            class="text-sm opacity-50 hover-opacity-100 text-decoration-none d-flex align-items-center justify-content-center gap-2 text-white">
            <i class="bi bi-arrow-left"></i> Back to home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
