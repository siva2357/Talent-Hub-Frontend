<div class="auth-container">
  <!-- BACKGROUND BLOBS -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card-wrapper">
    <div class="auth-card glass text-center p-4">
      <!-- LOGO -->
      <div class="logo-container mb-4">
        <img src="assets/logo/website-logo.png" alt="Talent Hub" class="auth-logo">
      </div>

      <!-- TITLE & DESC -->
      <div class="auth-header mb-4">
        <h4 class="fw-bold text-white mb-2">Reset Password</h4>

      </div>

      <!-- ERROR/SUCCESS ALERTS -->
      @if (errorMessage) {
      <div class="alert alert-danger text-xs py-2 px-3 border-0 rounded-3 d-flex align-items-center gap-2 mb-3"
        style="background: rgba(239, 68, 68, 0.15); color: #ff4d4f; border: 1px solid rgba(239, 68, 68, 0.3) !important;">
        <i class="bi bi-exclamation-octagon-fill"></i>
        <span>{{ errorMessage }}</span>
      </div>
      }
      @if (successMessage) {
      <div class="alert alert-success text-xs py-2 px-3 border-0 rounded-3 d-flex align-items-center gap-2 mb-3"
        style="background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3) !important;">
        <i class="bi bi-check-circle-fill"></i>
        <span>{{ successMessage }}</span>
      </div>
      }

      <!-- FORM -->
      <form (ngSubmit)="onSubmit()" class="auth-form text-start mb-4">
        <!-- NEW PASSWORD -->
        <div class="mb-3">
          <label class="form-label text-white opacity-90 fw-medium mb-2">New Password</label>
          <app-input type="password" placeholder="Enter your new password" icon="bi-lock" [showPasswordToggle]="true"
            [(ngModel)]="newPassword" name="newPassword" [disabled]="isLoading">
          </app-input>
          <p class="text-xs opacity-50 mt-2 line-height-sm">
            Password must be at least 8 characters long and include uppercase, lowercase, number and special character.
          </p>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="mb-4">
          <label class="form-label text-white opacity-90 fw-medium mb-2">Confirm Password</label>
          <app-input type="password" placeholder="Confirm your new password" icon="bi-lock" [showPasswordToggle]="true"
            [(ngModel)]="confirmPassword" name="confirmPassword" [disabled]="isLoading">
          </app-input>
        </div>

        <div class="text-center">
          <app-button type="submit" variant="primary" size="md" [disabled]="isLoading || !newPassword || !confirmPassword" [loading]="isLoading"
            customClass="px-5 py-2 d-inline-flex align-items-center justify-content-center gap-3 w-100 max-w-400">
            <i class="bi bi-shield-lock text-lg"></i>
            <span class="text-md">Reset Password</span>
          </app-button>
        </div>
      </form>
    </div>
  </div>
</div>
