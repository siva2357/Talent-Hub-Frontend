<div class="error-page-container">
    <!-- DECORATIVE BLOBS -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="error-content-wrapper">

        <!-- 404 TEXT AREA -->
        <div class="huge-404-wrapper">
            <h3 class="text-404">404</h3>
            <div class="text-404-blur">404</div>
        </div>

        <div class="text-center mb-3">
            <h2 class="error-subtitle mb-2">Oops! Page Not Found</h2>
            <p class="error-desc opacity-60">
                The page you're looking for doesn't exist or has been moved.
            </p>
        </div>

        <!-- ILLUSTRATION AREA -->
        <div class="not-found-illustration mb-5">
            <div class="signpost-wrapper">
                <div class="signpost">
                    <div class="sign-top">
                        <span>PAGE NOT FOUND</span>
                        <i class="bi bi-emoji-frown ms-2"></i>
                    </div>
                    <div class="sign-pole"></div>
                </div>
                <!-- DECORATIVE ELEMENTS -->
                <div class="paper-plane">
                    <i class="bi bi-send-fill"></i>
                </div>
                <div class="ground-deco">
                    <div class="plant p1"></div>
                    <div class="plant p2"></div>
                </div>
            </div>
        </div>

        <!-- ACTION AREA -->
        <div class="action-buttons d-flex align-items-center gap-3">
            <app-button variant="primary" size="lg" routerLink="/" customClass="px-5">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-house-door"></i>
                    Back to Home
                </div>
            </app-button>

            <app-button variant="outline" size="lg" routerLink="/find-work" customClass="px-5">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-compass"></i>
                    Explore Jobs
                </div>
            </app-button>
        </div>

        <div class="mt-5">
            <a routerLink="/support" class="support-link">
                <i class="bi bi-headset me-2"></i>
                Need help? <span class="text-brand">Contact Support</span>
            </a>
        </div>
    </div>
</div>
