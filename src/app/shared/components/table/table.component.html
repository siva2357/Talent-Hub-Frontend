<div class="table-wrapper">

  <ngx-datatable
    #table
    class="bootstrap dark-table"
    [rows]="rows"
    [loadingIndicator]="loading"
    [columnMode]="'force'"
    [headerHeight]="50"
    [footerHeight]="70"
    [rowHeight]="55"
    [limit]="pageSize"
    [messages]="{
      emptyMessage: 'No data available'
    }"
    (activate)="onActivate($event)">

    @for (column of columns; track column.prop) {

<ngx-datatable-column
  [name]="column.name!"
  [prop]="column.prop!"
  [width]="column.width || 150"
  [sortable]="column.sortable ?? true">

        <ng-template
          ngx-datatable-cell-template
          let-row="row">

          @if (column.cellTemplate) {

            <ng-container
              *ngTemplateOutlet="
                column.cellTemplate;
                context: {
                  $implicit: row,
                  row: row,
                  value: row[column.prop!]
                }
              ">
            </ng-container>

          } @else {

            {{ row[column.prop!] }}

          }

        </ng-template>

      </ngx-datatable-column>

    }



    <ngx-datatable-footer>
      <ng-template
        ngx-datatable-footer-template
        let-rowCount="rowCount"
        let-pageSize="pageSize"
        let-selectedCount="selectedCount"
        let-curPage="curPage"
        let-offset="offset"
        let-isVisible="isVisible">
        
        <div class="table-footer-toolbar d-flex justify-content-between align-items-center w-100">
          
          <div class="page-size-wrapper">
            <span>Show</span>
            <select
              class="page-size-select"
              [(ngModel)]="this.pageSize"
              (ngModelChange)="onPageSizeChange()">
              @for (size of pageSizeOptions; track size) {
                <option [ngValue]="size">
                  {{ size }}
                </option>
              }
            </select>
            <span>entries</span>
          </div>

          <datatable-pager
            [pagerLeftArrowIcon]="'bi bi-chevron-left'"
            [pagerRightArrowIcon]="'bi bi-chevron-right'"
            [pagerPreviousIcon]="'bi bi-chevron-double-left'"
            [pagerNextIcon]="'bi bi-chevron-double-right'"
            [page]="curPage"
            [size]="pageSize"
            [count]="rowCount"
            [hidden]="!((rowCount / pageSize) > 0)"
            (change)="table.onFooterPage($event)">
          </datatable-pager>

        </div>

      </ng-template>
    </ngx-datatable-footer>

  </ngx-datatable>

</div>
